services:
  backend:
    container_name: ${APP_NAME}-backend
    image: ${REGISTRY}/${NAMESPACE}/${APP_NAME}-backend:${BACKEND_TAG}
    env_file:
      - ../config/backend.env
    ports:
      - "${BACKEND_PORT}:8000"
    volumes:
      - ../data:/app/data
    restart: unless-stopped
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  frontend:
    container_name: ${APP_NAME}-frontend
    image: ${REGISTRY}/${NAMESPACE}/${APP_NAME}-frontend:${FRONTEND_TAG}
    environment:
      FRONTEND_DEFAULT_API_BASE_URL: ${FRONTEND_DEFAULT_API_BASE_URL:-http://127.0.0.1:${BACKEND_PORT}}
      FRONTEND_TURNSTILE_SITE_KEY: ${FRONTEND_TURNSTILE_SITE_KEY:-}
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=${TZ}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_REVIVE_STOPPED=false
      - WATCHTOWER_NO_STARTUP_MESSAGE=false
      - WATCHTOWER_SCHEDULE=
    command: --interval ${WATCHTOWER_POLL_INTERVAL} ${APP_NAME}-backend ${APP_NAME}-frontend
