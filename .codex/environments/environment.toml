# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "stable_nanobananapro"

[setup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

cd "$(git rev-parse --show-toplevel)"
./scripts/worktree-dev.sh bootstrap

'''

[cleanup]
script = '''
#!/usr/bin/env bash
set -euo pipefail

cd "$(git rev-parse --show-toplevel)"

# 尽量先走项目自己的停止逻辑
./scripts/worktree-dev.sh down >/dev/null 2>&1 || true

python3 <<'PY'
import hashlib
import json
import os
import shutil
import signal
import subprocess
import time
from pathlib import Path

worktree_root = Path(subprocess.check_output(
    ["git", "rev-parse", "--show-toplevel"],
    text=True,
).strip()).resolve()

common_git_dir = subprocess.check_output(
    ["git", "rev-parse", "--git-common-dir"],
    text=True,
).strip()
common_git_dir = (worktree_root / common_git_dir).resolve() if not common_git_dir.startswith("/") else Path(common_git_dir).resolve()
common_repo_root = common_git_dir.parent if common_git_dir.name == ".git" else worktree_root

instance_id = "wt_" + hashlib.sha256(str(worktree_root).encode("utf-8")).hexdigest()[:8]
instance_dir = common_repo_root / ".codex-dev-env" / "instances" / instance_id
instance_json = instance_dir / "instance.json"

ports = []
if instance_json.exists():
    try:
        data = json.loads(instance_json.read_text())
        ports = [data["ports"]["backend"], data["ports"]["frontend"]]
    except Exception:
        ports = []

def pids_on_port(port: int):
    try:
        out = subprocess.check_output(
            ["lsof", "-tiTCP:%d" % port, "-sTCP:LISTEN"],
            text=True,
            stderr=subprocess.DEVNULL,
        ).strip()
    except Exception:
        return []
    return [int(x) for x in out.splitlines() if x.strip().isdigit()]

def kill_pid(pid: int):
    for sig in (signal.SIGTERM, signal.SIGKILL):
        try:
            os.kill(pid, sig)
        except ProcessLookupError:
            return
        except PermissionError:
            return
        time.sleep(0.5)

for port in ports:
    for pid in pids_on_port(port):
        kill_pid(pid)

if instance_dir.exists():
    shutil.rmtree(instance_dir, ignore_errors=True)
PY
'''
